name: changeset-check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least-privilege: read the code, write PR comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff against the PR base branch.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Evaluate changeset requirement
        id: check
        # Never fail here: the script still writes required/has_changeset to
        # $GITHUB_OUTPUT, and the dedicated gate step below decides pass/fail.
        run: node scripts/changeset-required.mjs "origin/${{ github.base_ref }}" || true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          REQUIRED: ${{ steps.check.outputs.required }}
          HAS_CHANGESET: ${{ steps.check.outputs.has_changeset }}
        with:
          script: |
            const marker = '<!-- changeset-check -->';
            const required = process.env.REQUIRED === 'true';
            const hasChangeset = process.env.HAS_CHANGESET === 'true';
            const missing = required && !hasChangeset;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (missing) {
              const body = [
                marker,
                '### 🦋 Changeset required',
                '',
                'This PR changes non-documentation files but does not include a changeset.',
                '',
                'Add one by running:',
                '',
                '```bash',
                'pnpm changeset',
                '```',
                '',
                'then commit the generated file in `.changeset/`. This comment will be removed automatically once a changeset is detected.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } else if (existing) {
              // A changeset was added (or no changeset is required) on a later
              // commit: remove the reminder comment.
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id,
              });
            }

      - name: Enforce changeset (blocking)
        if: always()
        run: |
          if [ "${{ steps.check.outputs.required }}" = "true" ] && [ "${{ steps.check.outputs.has_changeset }}" != "true" ]; then
            echo "::error::A changeset is required but none was found. Run 'pnpm changeset'."
            exit 1
          fi
          echo "Changeset check passed."
