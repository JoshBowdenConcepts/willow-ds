name: coverage-check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least-privilege: read the code, write PR comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Run coverage
        id: coverage
        # Always continue so the comment step can report numbers even on failure.
        run: pnpm run test:coverage || true

      - name: Build coverage report
        id: report
        if: always()
        run: node scripts/coverage-report.mjs "origin/${{ github.base_ref }}" || true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.report.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- coverage-check -->';
            const body = process.env.COMMENT_BODY;

            if (!body) {
              core.warning('No coverage comment body was produced; skipping PR comment.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce coverage (blocking)
        if: always()
        run: |
          if [ "${{ steps.report.outputs.passed }}" != "true" ]; then
            echo "::error::Coverage is below the 90% threshold. Run 'pnpm run test:coverage' locally."
            exit 1
          fi
          echo "Coverage check passed."
